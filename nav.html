<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航</title>
<style>
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #fff; margin: 0; padding: 4px;
}
.nav { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.nav a {
  display: inline-block; padding: 6px 14px; border-radius: 16px;
  font-size: 13px; font-weight: 500; text-decoration: none;
  color: #9b59b6; background: #f5f0ff;
  border: 1px solid rgba(155,89,182,0.15);
  transition: all 0.2s;
}
.nav a:hover {
  background: #9b59b6; color: #fff; transform: translateY(-1px);
}
</style>
</head>
<body>
<div class="nav">
  <a href="#">🏠 首页</a>
  <a href="#">📋 待办</a>
  <a href="#">📊 项目</a>
  <a href="#">📝 笔记</a>
  <a href="#">📅 日历</a>
  <a href="#">📚 知识库</a>
  <a href="#">⭐ 收藏</a>
  <a href="#">📁 归档</a>
</div>
</body>
</html>
