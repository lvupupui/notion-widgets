<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相册画廊</title>
<style>
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#fff;margin:0;padding:20px;text-align:center}
.grid{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;max-width:400px;margin:0 auto}
.img{width:80px;height:80px;border-radius:10px;background:linear-gradient(135deg,#e8d5f0,#d1c4e9);display:flex;align-items:center;justify-content:center;font-size:28px}
body::after{content:"🔒 付费解锁";position:fixed;bottom:12px;right:16px;background:rgba(155,89,182,0.92);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;font-family:'PingFang SC','Microsoft YaHei',sans-serif;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.2);pointer-events:none}
</style>
</head>
<body>
<p style="color:#9b59b6;font-weight:600;margin-bottom:14px">📸 相册画廊</p>
<div class="grid">
  <div class="img">🏞</div>
  <div class="img">🌅</div>
  <div class="img">🏔</div>
  <div class="img">🌊</div>
</div>
</body>
</html>
