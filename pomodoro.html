<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #ffffff;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
}
.container {
  text-align: center; padding: 20px;
}
.timer-ring {
  width: 180px; height: 180px; margin: 0 auto 20px;
  position: relative;
}
.timer-ring svg { transform: rotate(-90deg); }
.timer-ring .bg { fill: none; stroke: #f0e6f6; stroke-width: 8; }
.timer-ring .progress { fill: none; stroke: url(#grad); stroke-width: 8;
  stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.time-display {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 48px; font-weight: 700; color: #9b59b6;
  font-family: 'JetBrains Mono', 'SF Mono', monospace; letter-spacing: 2px;
}
.label {
  font-size: 13px; color: #999; margin-top: -10px; letter-spacing: 4px;
}
.buttons { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
.btn {
  padding: 10px 24px; border: none; border-radius: 25px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.btn-start { background: linear-gradient(135deg, #9b59b6, #6c63ff); color: #fff; }
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(155,89,182,0.4); }
.btn-pause { background: #f0e6f6; color: #9b59b6; }
.btn-pause:hover { background: #e8d5f0; }
.btn-reset { background: transparent; color: #999; border: 1px solid #ddd; }
.btn-reset:hover { border-color: #9b59b6; color: #9b59b6; }
.mode-tabs { display: flex; gap: 4px; justify-content: center; margin-bottom: 20px;
  background: #f5f0f8; border-radius: 25px; padding: 4px; display: inline-flex; }
.mode-tab {
  padding: 8px 20px; border-radius: 22px; border: none;
  font-size: 13px; cursor: pointer; font-weight: 500;
  background: transparent; color: #888; transition: all 0.2s;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.mode-tab.active { background: #9b59b6; color: #fff; box-shadow: 0 2px 8px rgba(155,89,182,0.3); }
</style>
</head>
<body>
<div class="container">
  <div class="mode-tabs">
    <button class="mode-tab active" data-min="25">番茄 25分</button>
    <button class="mode-tab" data-min="15">短休 5分</button>
    <button class="mode-tab" data-min="30">长休 15分</button>
  </div>
  <div class="timer-ring">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#9b59b6"/>
        <stop offset="100%" style="stop-color:#6c63ff"/>
      </linearGradient></defs>
      <circle class="bg" cx="90" cy="90" r="80"/>
      <circle class="progress" id="progress" cx="90" cy="90" r="80"
        stroke-dasharray="502.65" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display" id="time">25:00</div>
  </div>
  <div class="label">专注时间</div>
  <div class="buttons">
    <button class="btn btn-start" id="btnStart">开始</button>
    <button class="btn btn-pause" id="btnPause">暂停</button>
    <button class="btn btn-reset" id="btnReset">重置</button>
  </div>
</div>
<script>
let totalSeconds = 25 * 60, remaining = totalSeconds, interval = null;
const circumference = 502.65;
const display = document.getElementById('time');
const progress = document.getElementById('progress');
const btnStart = document.getElementById('btnStart');
const btnPause = document.getElementById('btnPause');
const btnReset = document.getElementById('btnReset');

function updateDisplay() {
  const m = Math.floor(remaining / 60), s = remaining % 60;
  display.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  progress.style.strokeDashoffset = circumference * (1 - remaining / totalSeconds);
}

function start() {
  if (interval) return;
  interval = setInterval(() => {
    if (remaining <= 0) { pause(); alert('🍅 时间到！休息一下吧'); return; }
    remaining--; updateDisplay();
  }, 1000);
}

function pause() { clearInterval(interval); interval = null; }

function reset() {
  pause(); remaining = totalSeconds; updateDisplay();
}

btnStart.onclick = start;
btnPause.onclick = pause;
btnReset.onclick = reset;

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelector('.mode-tab.active').classList.remove('active');
    tab.classList.add('active');
    const mins = parseInt(tab.dataset.min);
    totalSeconds = mins * 60; remaining = totalSeconds;
    pause(); updateDisplay();
  };
});

updateDisplay();
</script>
</body>
</html>
