<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目标追踪器</title>
<style>
:root{--pink:#FF6B9D;--purple:#7B4BA3;--bg:#FFF8FA;--card:#fff;--text:#4B2B68;--yellow:#FFD66B;--green:#BFD8B8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);padding:20px;color:var(--text)}
.container{max-width:440px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:24px;font-weight:800;color:var(--purple)}
.header p{font-size:13px;color:#999;margin-top:4px}
.goal-card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(155,89,182,.06)}
.goal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.goal-icon{font-size:32px}
.goal-meta{flex:1;margin-left:12px}
.goal-title{font-weight:700;font-size:15px}
.goal-deadline{font-size:11px;color:#999;margin-top:2px}
.goal-progress-text{text-align:right;font-size:12px;color:var(--pink);font-weight:700}
.progress-bar{height:6px;background:#F0E6F6;border-radius:3px;margin:8px 0;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-fill.pink{background:linear-gradient(90deg,var(--pink),#FFB8D0)}
.progress-fill.purple{background:linear-gradient(90deg,var(--purple),#C9B3FF)}
.progress-fill.green{background:linear-gradient(90deg,#43e97b,#38f9d7)}
.milestones{display:flex;justify-content:space-between;font-size:10px;color:#bbb;margin-top:4px}
.milestone{text-align:center}
.milestone .dot{width:8px;height:8px;border-radius:50%;background:#ddd;margin:0 auto 2px}
.milestone .dot.done{background:var(--pink)}
.milestone .dot.cur{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.subtasks{display:flex;flex-direction:column;gap:4px;margin-top:10px;padding-top:8px;border-top:1px solid #F0E6F6}
.subtask{display:flex;align-items:center;gap:8px;font-size:12px}
.subtask .box{width:14px;height:14px;border-radius:3px;border:2px solid #ddd;flex-shrink:0}
.subtask .box.done{background:var(--green);border-color:var(--green)}
.subtask .box.done::after{content:'✓';font-size:9px;color:#3a6b35;position:absolute;font-weight:700}
.subtask-text.done{text-decoration:line-through;color:#bbb}
.add-btn{text-align:center;padding:10px;background:#faf8ff;border-radius:12px;border:2px dashed rgba(155,89,182,.2);color:var(--pink);font-weight:700;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>🎯 目标追踪器</h1><p>2026年度目标 · 3/4 进行中</p></div>

<div class="goal-card">
<div class="goal-top">
<div class="goal-icon">📦</div>
<div class="goal-meta"><div class="goal-title">Notion 模板产品线</div><div class="goal-deadline">⏰ 截止：6月30日</div></div>
<div class="goal-progress-text">65%</div>
</div>
<div class="progress-bar"><div class="progress-fill pink" style="width:65%"></div></div>
<div class="milestones">
<div class="milestone"><div class="dot done"></div>设计</div>
<div class="milestone"><div class="dot cur"></div>开发</div>
<div class="milestone"><div class="dot"></div>上线</div>
<div class="milestone"><div class="dot"></div>首单</div>
<div class="milestone"><div class="dot"></div>50单</div>
</div>
<div class="subtasks">
<div class="subtask"><div class="box done"></div><span class="subtask-text done">组件包3套皮肤</span></div>
<div class="subtask"><div class="box done"></div><span class="subtask-text done">GitHub部署</span></div>
<div class="subtask"><div class="box"></div><span class="subtask-text">做3个Notion模板</span></div>
<div class="subtask"><div class="box"></div><span class="subtask-text">小红书发帖</span></div>
</div>
</div>

<div class="goal-card">
<div class="goal-top">
<div class="goal-icon">💪</div>
<div class="goal-meta"><div class="goal-title">减脂 5 公斤</div><div class="goal-deadline">⏰ 截止：8月31日</div></div>
<div class="goal-progress-text">30%</div>
</div>
<div class="progress-bar"><div class="progress-fill purple" style="width:30%"></div></div>
<div class="milestones">
<div class="milestone"><div class="dot done"></div>66→64</div>
<div class="milestone"><div class="dot cur"></div>64→62</div>
<div class="milestone"><div class="dot"></div>62→60</div>
<div class="milestone"><div class="dot"></div>60→59</div>
<div class="milestone"><div class="dot"></div>59→58</div>
</div>
<div class="subtasks">
<div class="subtask"><div class="box done"></div><span class="subtask-text done">每天运动30分</span></div>
<div class="subtask"><div class="box"></div><span class="subtask-text">戒奶茶</span></div>
<div class="subtask"><div class="box"></div><span class="subtask-text">每周称重</span></div>
</div>
</div>

<div class="goal-card">
<div class="goal-top">
<div class="goal-icon">📚</div>
<div class="goal-meta"><div class="goal-title">读完 24 本书</div><div class="goal-deadline">⏰ 截止：12月31日</div></div>
<div class="goal-progress-text">33%</div>
</div>
<div class="progress-bar"><div class="progress-fill green" style="width:33%"></div></div>
<div class="subtasks">
<div class="subtask"><div class="box done"></div><span class="subtask-text done">原子习惯 ✓</span></div>
<div class="subtask"><div class="box done"></div><span class="subtask-text done">纳瓦尔宝典 ✓</span></div>
<div class="subtask"><div class="box"></div><span class="subtask-text">正在读：Show Your Work</span></div>
</div>
</div>

<div class="add-btn">＋ 创建新目标</div>
</div>
</body></html>
