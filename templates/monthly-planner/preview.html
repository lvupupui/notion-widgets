<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月度管理器</title>
<style>
:root{--pink:#FF6B9D;--purple:#7B4BA3;--bg:#FFF8FA;--card:#fff;--text:#4B2B68;--border:#F0E6F6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);padding:20px;color:var(--text)}
.container{max-width:420px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:24px;font-weight:800;color:var(--purple)}
.header .badge{display:inline-block;margin-top:6px;padding:3px 14px;border-radius:12px;background:var(--pink);color:#fff;font-size:12px;font-weight:700}
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(155,89,182,.05)}
.section-title{font-weight:700;font-size:14px;color:var(--purple);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.goals{display:flex;flex-direction:column;gap:8px}
.goal{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#faf8ff;border-radius:10px}
.goal-check{width:20px;height:20px;border-radius:50%;border:2px solid #ddd;flex-shrink:0}
.goal-check.done{background:var(--pink);border-color:var(--pink);position:relative}
.goal-check.done::after{content:'✓';color:#fff;font-size:12px;font-weight:700;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.goal-text{flex:1;font-size:13px}
.goal-text.done{text-decoration:line-through;color:#bbb}
.cal-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:11px}
.cal-mini .day{width:28px;height:28px;border-radius:50%;line-height:28px;margin:0 auto}
.cal-mini .wday{color:var(--purple);font-weight:600;font-size:10px}
.cal-mini .today{background:var(--pink);color:#fff;font-weight:700}
.cal-mini .event{position:relative}
.cal-mini .event::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--pink)}
.week-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.week-row:last-child{border:none}
.week-date{color:#999;min-width:36px}
.week-focus{font-weight:600}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>📅 月度管理器</h1><div class="badge">2026年5月</div></div>

<div class="card">
<div class="section-title">🎯 本月目标（3个）</div>
<div class="goals">
<div class="goal"><div class="goal-check done"></div><span class="goal-text done">完成组件包产品上线</span></div>
<div class="goal"><div class="goal-check"></div><span class="goal-text">运动打卡 15 天</span></div>
<div class="goal"><div class="goal-check"></div><span class="goal-text">读完 2 本书</span></div>
</div>
</div>

<div class="card">
<div class="section-title">📆 本周重点</div>
<div class="week-row"><span class="week-date">周一</span><span class="week-focus">发小红书笔记</span><span style="color:#999;font-size:11px">已完成</span></div>
<div class="week-row"><span class="week-date">周二</span><span class="week-focus">做模板设计</span><span style="color:#999;font-size:11px">已完成</span></div>
<div class="week-row"><span class="week-date">周三</span><span class="week-focus">GitHub部署</span><span style="color:#999;font-size:11px">已完成</span></div>
<div class="week-row"><span class="week-date" style="color:var(--pink);font-weight:700">今天</span><span class="week-focus">推模板产品</span><span style="color:var(--pink);font-size:11px">进行中</span></div>
<div class="week-row"><span class="week-date">周五</span><span class="week-focus">准备小红书素材</span></div>
<div class="week-row"><span class="week-date">周六</span><span class="week-focus">休息</span></div>
<div class="week-row"><span class="week-date">周日</span><span class="week-focus">复盘本周</span></div>
</div>

<div class="card">
<div class="section-title">🌙 每日流程模板</div>
<div style="display:flex;flex-direction:column;gap:4px;font-size:12px">
<div style="padding:6px 10px;background:#FFF3E0;border-radius:8px">☀️ 起床 · 冥想10分 · 看今日重点</div>
<div style="padding:6px 10px;background:#EDE7F6;border-radius:8px">📝 深度工作 2小时 · 处理消息</div>
<div style="padding:6px 10px;background:#E8F5E9;border-radius:8px">🏃 运动 · 复盘当天 · 写日记</div>
</div>
</div>

</div></body></html>
