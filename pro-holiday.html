<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>节假日倒计时 - Pro</title>
<style>
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#fff;margin:0;padding:10px}
.card{max-width:300px;margin:0 auto}
.title{font-size:14px;color:#9b59b6;font-weight:600;margin-bottom:10px;text-align:center}
.item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;margin-bottom:6px;border-radius:12px;background:#faf8ff}
.name{font-size:14px}
.count{font-family:'JetBrains Mono','SF Mono',monospace;font-size:18px;font-weight:700;color:#9b59b6}
.tag{display:inline-block;padding:2px 8px;border-radius:8px;background:#f5f0ff;color:#9b59b6;font-size:10px;margin-left:6px}
.pro-badge{display:inline-block;padding:3px 10px;border-radius:10px;background:#9b59b6;color:#fff;font-size:11px;margin-bottom:8px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div style="text-align:center"><div class="pro-badge">Pro 专属</div></div>
  <div class="title">🎊 即将到来的节日</div>
  <div class="item"><span class="name">🎋 端午节</span><span class="count">28<span style="font-size:11px;color:#999">天</span></span></div>
  <div class="item"><span class="name">👶 儿童节</span><span class="count">29<span style="font-size:11px;color:#999">天</span></span></div>
  <div class="item"><span class="name">🎓 高考</span><span class="count">35<span style="font-size:11px;color:#999">天</span></span></div>
  <div class="item"><span class="name">🌕 中秋节</span><span class="count">125<span style="font-size:11px;color:#999">天</span></span><span class="tag">+国庆</span></div>
  <div class="item"><span class="name">🧨 春节2027</span><span class="count">272<span style="font-size:11px;color:#999">天</span></span></div>
  <p style="color:#999;font-size:11px;text-align:center;margin-top:10px">自动计算所有中国节日 · Pro版解锁</p>
</div>
</body>
</html>
