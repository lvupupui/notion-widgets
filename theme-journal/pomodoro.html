<style>
:root{
--paper:#F8EEDC;--cream:#FFF8EA;--pink:#F7A7B8;
--purple:#D8C3F2;--yellow:#FFE39A;--brown:#5B4333;
--soft-brown:#7A6252;--orange:#FFD6A5;--sky:#DCEEFF;--leaf:#BFD8B8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'LXGW WenKai','Ma Shan Zheng','PingFang SC','Microsoft YaHei',serif;
background:linear-gradient(180deg,#FFF7E8,#F4E4CC);
min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;
}
.card{
background:#FFF8EA;border:2px solid #F1C7B8;border-radius:20px;
box-shadow:0 8px 18px rgba(91,67,51,.14),0 2px 5px rgba(91,67,51,.08);
padding:26px;text-align:center;color:var(--brown);position:relative;
}
.card::before{
content:"";position:absolute;inset:8px;
border:2px dashed rgba(91,67,51,.18);border-radius:14px;pointer-events:none;
}
.title{
font-size:22px;font-weight:900;color:var(--brown);margin-bottom:14px;
position:relative;display:inline-block;
}
.title::after{
content:"";position:absolute;bottom:-4px;left:0;right:0;
height:3px;background:linear-gradient(90deg,var(--pink),var(--yellow));
border-radius:2px;
}
.num{
font-family:'JetBrains Mono','SF Mono',monospace;
font-size:46px;font-weight:800;color:var(--brown);line-height:1.1;
}
.label{font-size:12px;color:var(--soft-brown);margin-top:2px}
.tape{
display:inline-block;padding:7px 18px;background:var(--pink);color:#fff;
border-radius:6px;font-weight:800;font-size:13px;
transform:rotate(-2deg);box-shadow:0 4px 8px rgba(91,67,51,.1);
}
.sticker{
display:inline-block;padding:5px 14px;background:var(--cream);
border:2px solid var(--pink);border-radius:12px;font-size:12px;font-weight:700;
color:var(--brown);box-shadow:0 0 0 3px #fff,0 4px 8px rgba(91,67,51,.08);
}
.btn{
display:inline-block;padding:9px 22px;border-radius:18px;
border:2px solid var(--pink);font-size:13px;font-weight:700;cursor:pointer;
font-family:inherit;transition:all .2s;background:var(--cream);color:var(--brown);
}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(91,67,51,.12)}
.btn-primary{background:var(--pink);color:#fff;border-color:var(--pink)}
.grid{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.box{
background:var(--cream);border-radius:16px;
border:2px dashed rgba(91,67,51,.15);
padding:14px 16px;min-width:60px;text-align:center;
}
.decor{position:absolute;font-size:24px;opacity:.7}

.pom-ring{width:170px;height:170px;margin:16px auto;position:relative}
.pom-svg{transform:rotate(-90deg)}
.pom-bg{fill:none;stroke:#F1D5D0;stroke-width:8}
.pom-progress{fill:none;stroke:url(#pg);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.pom-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:42px;font-weight:800;color:var(--brown)}
.tabs{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.tab{padding:7px 16px;border-radius:14px;border:1px dashed rgba(91,67,51,.2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--cream);color:var(--soft-brown)}
.tab.active{background:var(--pink);color:#fff;border-color:var(--pink)}
</style></head><body>
<div class="card"><span class="decor" style="top:8px;right:12px">🍅</span>
<div class="tabs"><button class="tab active" data-min="25">番茄 25分</button><button class="tab" data-min="5">短休 5分</button><button class="tab" data-min="15">长休 15分</button></div>
<div class="pom-ring"><svg class="pom-svg" width="170" height="170" viewBox="0 0 170 170">
<defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#F7A7B8"/><stop offset="100%" style="stop-color:#FFE39A"/></linearGradient></defs>
<circle class="pom-bg" cx="85" cy="85" r="75"/>
<circle class="pom-progress" id="prog" cx="85" cy="85" r="75" stroke-dasharray="471.24" stroke-dashoffset="0"/></svg>
<div class="pom-time" id="time">25:00</div></div>
<div class="grid"><button class="btn btn-primary" id="btnS">▶ 开始</button><button class="btn" id="btnP">⏸ 暂停</button><button class="btn" id="btnR">↺ 重置</button></div>
</div><script>
var tot=1500,rem=tot,iv=null,c=471.24;
function u(){var m=Math.floor(rem/60),s=rem%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');document.getElementById('prog').style.strokeDashoffset=c*(1-rem/tot)}
document.getElementById('btnS').onclick=function(){if(iv)return;iv=setInterval(function(){if(rem<=0){clearInterval(iv);iv=null;alert('🍅 时间到！');return}rem--;u()},1000)};
document.getElementById('btnP').onclick=function(){clearInterval(iv);iv=null};
document.getElementById('btnR').onclick=function(){clearInterval(iv);iv=null;rem=tot;u()};
document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){document.querySelector('.tab.active').classList.remove('active');t.classList.add('active');tot=parseInt(t.dataset.min)*60;rem=tot;clearInterval(iv);iv=null;u()}});
u();</script></body></html>
