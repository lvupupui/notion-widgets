<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本月剩余</title>
<style>
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #fff; text-align: center; padding: 8px;
}
.title { color: #9b59b6; font-size: 15px; font-weight: 600; margin-bottom: 10px; }
.boxes { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.box {
  min-width: 56px; padding: 8px 6px; border-radius: 12px;
  background: #f3f8ff; border: 2px solid rgba(155,89,182,0.2);
  box-shadow: 0 2px 8px rgba(155,89,182,0.08);
}
.num {
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 32px; font-weight: 700; color: #9b59b6; line-height: 1.2;
}
.label { font-size: 12px; color: #999; margin-top: 2px; }
</style>
</head>
<body>
<div class="title">📅 本月还剩</div>
<div class="boxes">
  <div class="box"><div class="num" id="days">--</div><div class="label">天</div></div>
  <div class="box"><div class="num" id="hours">--</div><div class="label">时</div></div>
  <div class="box"><div class="num" id="mins">--</div><div class="label">分</div></div>
  <div class="box"><div class="num" id="secs">--</div><div class="label">秒</div></div>
</div>
<script>
function update() {
  var now = new Date();
  var totalDays = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  var d = totalDays - now.getDate();
  var h = 23 - now.getHours();
  var m = 59 - now.getMinutes();
  var s = 59 - now.getSeconds();
  document.getElementById('days').textContent = d;
  document.getElementById('hours').textContent = h;
  document.getElementById('mins').textContent = m;
  document.getElementById('secs').textContent = s;
}
update(); setInterval(update, 1000);
</script>
</body>
</html>
