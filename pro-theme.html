<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配色主题 - Pro</title>
<style>
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#fff;margin:0;padding:10px;text-align:center}
.themes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:350px;margin:0 auto}
.box{width:70px;height:70px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600;gap:3px;box-shadow:0 3px 10px rgba(0,0,0,.1)}
.purple{background:linear-gradient(135deg,#9b59b6,#6c63ff)}
.pink{background:linear-gradient(135deg,#f093fb,#f5576c)}
.green{background:linear-gradient(135deg,#43e97b,#38f9d7)}
.blue{background:linear-gradient(135deg,#667eea,#764ba2)}
.beige{background:linear-gradient(135deg,#faedcd,#d4a373);color:#6b4226}
.cyber{background:linear-gradient(135deg,#00ff87,#60efff);color:#0a0a2e}
.pro-badge{display:inline-block;padding:3px 10px;border-radius:10px;background:#9b59b6;color:#fff;font-size:11px;margin-bottom:14px}
</style>
</head>
<body>
<div class="pro-badge">Pro 专属</div>
<p style="font-size:13px;color:#555;margin-bottom:14px">一键切换6套配色</p>
<div class="themes">
  <div class="box purple">🔮<span>暗夜紫</span></div>
  <div class="box pink">🌸<span>樱花粉</span></div>
  <div class="box green">🌿<span>森林绿</span></div>
  <div class="box blue">🌊<span>海洋蓝</span></div>
  <div class="box beige">☕<span>日系米</span></div>
  <div class="box cyber">🌐<span>赛博</span></div>
</div>
<p style="color:#999;font-size:11px;margin-top:16px">所有组件一键换色 · Pro版解锁</p>
</body>
</html>
