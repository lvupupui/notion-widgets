<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问候时钟</title>
<style>
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#fff;display:flex;justify-content:center;align-items:center;min-height:80px;margin:0}
.card{padding:14px 28px;border-radius:18px;background:linear-gradient(135deg,#9b59b6,#6c63ff);color:#fff;text-align:center;box-shadow:0 4px 16px rgba(155,89,182,.25)}
.greet{font-size:22px;font-weight:600;margin-bottom:4px}
.datetime{font-family:'JetBrains Mono','SF Mono',monospace;font-size:14px;opacity:.9}
</style>
</head>
<body>
<div class="card">
  <div class="greet" id="g"></div>
  <div class="datetime" id="dt"></div>
</div>
<script>
var W=['日','一','二','三','四','五','六'];
function upd(){
  var n=new Date(),h=n.getHours(),g,em;
  if(h<6){g='夜深了';em='🌙'}else if(h<9){g='早上好';em='☀️'}else if(h<12){g='上午好';em='🌤️'}else if(h<14){g='中午好';em='☀️'}else if(h<18){g='下午好';em='🌤️'}else if(h<22){g='晚上好';em='🌙'}else{g='夜深了';em='🌙'}
  document.getElementById('g').textContent=em+' '+g+'！';
  document.getElementById('dt').textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日 星期'+W[n.getDay()]+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}
upd();setInterval(upd,1000);
</script>
</body>
</html>
