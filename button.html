<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>按钮</title>
<style>
body {
  font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
  background: #fff; text-align: center; margin: 0; padding: 10px;
}
.btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn {
  padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.2s; text-decoration: none;
  display: inline-block;
}
.btn-purple { background: linear-gradient(135deg,#9b59b6,#6c63ff); color: #fff; }
.btn-purple:hover { transform: translateY(-1px); opacity: .9; }
.btn-outline { background: #fff; color: #9b59b6; border: 1.5px solid #9b59b6; }
.btn-outline:hover { background: #f5f0ff; }
.btn-light { background: #f5f0ff; color: #9b59b6; }
.btn-light:hover { background: #e8d5f0; }
</style>

<style>
body::after {
  content: "🔒 付费解锁";
  position: fixed; bottom: 12px; right: 16px;
  background: rgba(155,89,182,0.92); color: #fff;
  padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
  z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,.2);
  pointer-events: none;
}
</style>

</head>
<body>
<div class="btns">
  <a class="btn btn-purple" href="#">✨ 开始使用</a>
  <a class="btn btn-outline" href="#">📖 了解更多</a>
  <a class="btn btn-light" href="#">💬 联系我</a>
</div>
</body>
</html>
