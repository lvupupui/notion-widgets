<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>农历日历 - Pro</title>
<style>
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#fff;margin:0;padding:8px;text-align:center}
.card{max-width:280px;margin:0 auto;padding:16px;border-radius:14px;background:#faf8ff;border:2px dashed rgba(155,89,182,.3)}
.month{font-size:16px;font-weight:700;color:#9b59b6;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;border-bottom:1px solid #f0e6f6;font-size:13px}
.row:last-child{border:none}
.solar{color:#555}
.lunar{color:#9b59b6;font-weight:600}
.festival{color:#e74c3c}
.pro-badge{display:inline-block;padding:4px 12px;border-radius:10px;background:#9b59b6;color:#fff;font-size:11px;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="pro-badge">Pro 专属</div>
  <div class="month">📅 五月 2026 · 农历四月</div>
  <div class="row"><span class="solar">5月3日</span><span class="lunar">四月初七</span></div>
  <div class="row"><span class="solar">5月4日</span><span class="lunar">四月初八</span></div>
  <div class="row"><span class="solar">5月5日</span><span class="festival">立夏 🌱</span></div>
  <div class="row"><span class="solar">5月15日</span><span class="festival">佛诞 🪷</span></div>
  <div class="row"><span class="solar">5月21日</span><span class="lunar">四月廿五</span></div>
  <div class="row"><span class="solar">5月31日</span><span class="festival">端午节 🎋</span></div>
  <p style="color:#999;font-size:11px;margin-top:12px">完整农历+节气+节日 · Pro版解锁</p>
</div>
</body>
</html>
