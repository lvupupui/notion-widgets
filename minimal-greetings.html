<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问候</title>
<style>
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #fff; display: flex; justify-content: center;
  align-items: center; min-height: 60px; margin: 0;
}
.card {
  padding: 12px 28px; border-radius: 16px;
  background: linear-gradient(135deg, #9b59b6, #6c63ff);
  color: #fff; font-size: 20px; font-weight: 600;
  box-shadow: 0 3px 12px rgba(155,89,182,0.2);
  text-align: center; white-space: nowrap;
}
</style>
</head>
<body>
<div class="card" id="greeting"></div>
<script>
var h = new Date().getHours(), g, e;
if (h < 6) { g = '夜深了'; e = '🌙'; }
else if (h < 9) { g = '早上好'; e = '☀️'; }
else if (h < 12) { g = '上午好'; e = '🌤'; }
else if (h < 14) { g = '中午好'; e = '☀️'; }
else if (h < 18) { g = '下午好'; e = '🌤'; }
else if (h < 22) { g = '晚上好'; e = '🌙'; }
else { g = '夜深了'; e = '🌙'; }
document.getElementById('greeting').textContent = e + ' ' + g + '！';
</script>
</body>
</html>
