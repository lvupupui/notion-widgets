<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气 - Pro</title>
<style>
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#e8f4fd,#d1e8ff);margin:0;padding:12px;text-align:center;min-height:150px}
.card{max-width:280px;margin:0 auto;padding:20px;border-radius:18px;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.pro-badge{display:inline-block;padding:3px 10px;border-radius:10px;background:#9b59b6;color:#fff;font-size:11px;margin-bottom:10px}
.city{font-size:15px;color:#555;margin-bottom:4px}
.temp{font-size:42px;font-weight:800;color:#333;line-height:1.2}
.desc{font-size:14px;color:#888;margin-top:2px}
.aqi{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 12px;border-radius:12px;background:#e8f5e9;font-size:12px;color:#2e7d32}
.info{font-size:11px;color:#bbb;margin-top:12px}
</style>
</head>
<body>
<div class="card">
  <div class="pro-badge">Pro 专属</div>
  <div class="city">📍 北京</div>
  <div class="temp">22°C</div>
  <div class="desc">☀️ 晴朗</div>
  <div class="aqi">🍃 空气优 42</div>
  <p class="info">实时中国城市天气+AQI · Pro版解锁</p>
</div>
</body>
</html>
