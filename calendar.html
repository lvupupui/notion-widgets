<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中文日历</title>
<style>
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#fff;margin:0;padding:6px}
#cal{max-width:320px;margin:0 auto;font-size:14px}
table{border-collapse:collapse;width:100%;background:#fff}
td,th{text-align:center;padding:8px 4px}
tr:first-child th{font-size:18px;font-weight:700;padding:12px 4px;background:#9b59b6;color:#fff;border-radius:8px 8px 0 0}
th{font-weight:600;color:#888;font-size:12px;border-bottom:1px solid #f0e6f6}
td{color:#444;font-size:14px}
td.today span{background:#9b59b6;color:#fff;font-weight:700;border-radius:50%;display:inline-block;width:28px;height:28px;line-height:28px}
td.other span{color:#ccc}
.btn-nav{background:none;border:none;color:#fff;font-size:16px;cursor:pointer;padding:0 8px}
</style>
</head>
<body>
<div id="cal"></div>
<script>
var M=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
var W=['一','二','三','四','五','六','日'];
var now=new Date();

function render(y,m){
  // Handle month overflow (the actual bug)
  if(m<0){y--;m=11}
  if(m>11){y++;m=0}

  var fd=new Date(y,m,1).getDay();
  fd=fd===0?6:fd-1;
  var dim=new Date(y,m+1,0).getDate();
  var dip=new Date(y,m,0).getDate();
  var td=new Date();
  var isTm=(y===td.getFullYear()&&m===td.getMonth());

  var h='<table>';
  h+='<tr><th colspan="7">';
  h+='<button class="btn-nav" onclick="render('+y+','+(m-1)+')">◀</button>';
  h+=' '+M[m]+' '+y+' ';
  h+='<button class="btn-nav" onclick="render('+y+','+(m+1)+')">▶</button>';
  h+='</th></tr><tr>';
  for(var i=0;i<7;i++) h+='<th>'+W[i]+'</th>';
  h+='</tr><tr>';
  for(var i=0;i<fd;i++) h+='<td class="other"><span>'+(dip-fd+i+1)+'</span></td>';
  for(var d=1;d<=dim;d++){
    var c='';
    if(isTm&&d===td.getDate()) c=' today';
    h+='<td class="'+c+'"><span>'+d+'</span></td>';
    if((fd+d)%7===0) h+='</tr><tr>';
  }
  var t=fd+dim,r=7-(t%7);
  if(r<7) for(var i=1;i<=r;i++) h+='<td class="other"><span>'+i+'</span></td>';
  h+='</tr></table>';
  document.getElementById('cal').innerHTML=h;
}
render(now.getFullYear(),now.getMonth());
</script>
</body>
</html>
