<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>元五七 Pro 自由搭配工作台</title>
<style>
:root{
  --bg1:#FFE2EF;--bg2:#F7E8FF;--bg3:#FFF8F3;--card:#fff;--text:#4B2B68;--muted:#8B6AA6;
  --pink:#FF6B9D;--pink2:#FFC0D9;--purple:#7B4BA3;--line:#F3D8EA;--yellow:#FFD66B;
  --shadow:0 14px 34px rgba(123,75,163,.14),0 8px 18px rgba(255,107,157,.10);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--text)}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2) 60%,var(--bg3));padding:16px}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.page{max-width:1480px;margin:0 auto}
.builder{display:grid;grid-template-columns:390px 1fr;gap:16px}
.panel,.preview{
  background:rgba(255,255,255,.76);border:3px solid rgba(255,255,255,.96);
  border-radius:30px;box-shadow:var(--shadow);padding:18px
}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.logo{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--pink),#A987E8);color:#fff;font-weight:950;border:3px solid #fff}
.brand b{font-size:24px;letter-spacing:2px}
.brand span{color:var(--muted);font-weight:850;font-size:13px}
h1{font-size:31px;line-height:1.12;margin:8px 0;color:var(--purple)}
.note{color:var(--muted);font-weight:850;line-height:1.55;margin:0 0 14px}
.block{background:#fff;border:2px solid rgba(255,255,255,.96);border-radius:22px;padding:14px;margin:12px 0}
.block h3{margin:0 0 10px;color:var(--purple)}
.field{display:grid;gap:6px;margin:10px 0}
.field label{font-size:13px;font-weight:900;color:var(--muted)}
.field input,.field select,.field textarea{width:100%;border:2px solid var(--line);border-radius:14px;padding:10px 12px;background:#FFF9FC;color:var(--text)}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.preset,.btn{
  border:0;border-radius:999px;padding:10px 12px;background:#FFF0F6;border:2px solid #FFD6E7;
  color:var(--purple);font-weight:950
}
.preset.active,.btn.primary{background:linear-gradient(90deg,var(--pink),var(--pink2));color:#fff;border-color:#fff}
.widget-list{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-height:360px;overflow:auto;padding-right:2px}
.check{display:flex;align-items:center;gap:7px;padding:8px;border-radius:14px;background:#FFF7FB;border:2px solid #FFE1EF;font-size:13px;font-weight:850}
.check input{accent-color:var(--pink)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.output{min-height:96px;resize:vertical}
.preview-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.preview h2{margin:0;color:var(--purple);font-size:26px}.preview small{color:var(--muted);font-weight:850}

/* Dashboard */
.pro-shell{position:relative;overflow:hidden;width:100%;min-height:100vh;padding:14px;background:linear-gradient(135deg,#FFE2EF,#F7E8FF 60%,#FFF8F3)}
.pro-shell:before{
  content:"";position:absolute;inset:-90px;
  background:
  radial-gradient(circle at 9% 12%,rgba(255,255,255,.88),transparent 20%),
  radial-gradient(circle at 86% 10%,rgba(255,214,107,.30),transparent 18%),
  radial-gradient(circle at 84% 86%,rgba(255,107,157,.16),transparent 24%);
  pointer-events:none;
}
.float-dot{display:none;position:absolute;z-index:0;border-radius:999px;background:rgba(255,255,255,.62);animation:float 9s ease-in-out infinite}
.motion-on .float-dot{display:block}
.float-dot.d1{width:68px;height:68px;left:8%;top:16%}
.float-dot.d2{width:42px;height:42px;left:76%;top:10%;animation-delay:1.5s}
.float-dot.d3{width:52px;height:52px;left:85%;top:72%;animation-delay:3s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
.pro-card{
  position:relative;z-index:1;max-width:1420px;margin:0 auto;border-radius:32px;
  background:rgba(255,255,255,.70);border:3px solid rgba(255,255,255,.96);box-shadow:var(--shadow);padding:14px;
}
.pro-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.titlebox{display:flex;align-items:center;gap:12px;min-width:0}
.avatar{width:50px;height:50px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--pink),#A987E8);color:#fff;font-weight:950;border:3px solid #fff;box-shadow:0 8px 18px rgba(123,75,163,.12)}
.titlebox b{font-size:28px;color:var(--purple);letter-spacing:1px;white-space:nowrap;outline:none;border-radius:10px;padding:2px 6px;margin-left:-6px}
.titlebox span{display:block;color:var(--muted);font-weight:850;font-size:13px;outline:none;border-radius:8px;padding:2px 6px;margin-left:-6px}
.titlebox b:focus,.titlebox span:focus{background:#FFF0F6;box-shadow:0 0 0 2px #FFD6E7 inset}
.badge{padding:9px 14px;border-radius:999px;background:#fff;color:var(--pink);font-weight:950;box-shadow:0 8px 18px rgba(123,75,163,.08)}
.widgets{display:grid;gap:10px;grid-auto-flow:row}
.layout-top{grid-template-columns:repeat(4,minmax(0,1fr))}
.layout-grid{grid-template-columns:repeat(5,minmax(0,1fr))}
.layout-compact{grid-template-columns:repeat(6,minmax(0,1fr))}
.layout-screensaver{grid-template-columns:1.35fr 1fr 1fr}
.layout-screensaver .widget.big-clock{grid-column:span 2;min-height:240px}
.density-cozy .widget{min-height:152px}
.density-compact .widget{min-height:128px}
.density-full .widget{min-height:118px}
.widget{
  position:relative;overflow:hidden;border-radius:22px;background:#fff;border:2px solid rgba(255,255,255,.96);
  box-shadow:0 8px 18px rgba(123,75,163,.10);padding:12px;min-height:140px
}
.widget.wide{grid-column:span 2}
.widget h3{margin:0 0 8px;color:var(--purple);font-size:15px;white-space:nowrap}
.center{height:calc(100% - 28px);display:grid;place-items:center;text-align:center}
.time{font-size:34px;color:var(--pink);font-weight:950;font-variant-numeric:tabular-nums;line-height:1}
.big-clock .time{font-size:70px}
.bigtext{font-size:24px;color:var(--purple);font-weight:950}
.muted{font-size:12px;color:var(--muted);font-weight:850}
.quote{font-size:18px;line-height:1.38;color:var(--purple);font-weight:950;text-align:center}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.cal b{font-size:10px;color:var(--muted)}
.cal span{min-height:18px;display:grid;place-items:center;border-radius:7px;background:#FFF7FB;font-size:10px;font-weight:850}
.cal .on{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff}
.counts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.count{text-align:center;padding:8px 4px;border-radius:13px;background:#FFF7FB;border:1px solid #FFE0EF}
.count b{display:block;font-size:20px;color:var(--purple);font-variant-numeric:tabular-nums}
.progress,.goalbar{height:10px;border-radius:999px;background:#F4DDF0;overflow:hidden;margin-top:8px}
.progress i,.goalbar i{display:block;height:100%;background:linear-gradient(90deg,var(--pink),var(--pink2))}
.weather{display:flex;align-items:center;justify-content:space-between}.temp{font-size:38px;font-weight:950;color:var(--purple)}.sun{font-size:48px}
.btn-small{border:0;border-radius:999px;padding:8px 13px;background:linear-gradient(90deg,var(--pink),var(--pink2));color:#fff;font-weight:950}
.btn-small.ghost{background:#FFF0F6;color:var(--purple);border:2px solid #FFD6E7}
.row{display:flex;gap:7px;align-items:center;justify-content:center;flex-wrap:wrap}
.pomo{display:grid;place-items:center;gap:8px}.pomo-time{font-size:38px;color:var(--pink);font-weight:950}
.goals,.habits,.reading-list,.morning-list,.finance-list,.trip-list{display:grid;gap:6px}
.goal-line{display:flex;align-items:center;gap:8px}
.goal-line input[type=checkbox],.habits input{accent-color:var(--pink)}
.goal-line input[type=text]{flex:1;min-width:0;border:0;border-bottom:2px solid #FFE0EF;background:transparent;color:var(--text);outline:none;font-weight:850;font-size:13px}
.habits label{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:850;color:var(--text)}
.notearea{width:100%;min-height:76px;resize:none;border:2px dashed #FFD3E4;border-radius:16px;padding:10px;background:#FFF9FC;color:var(--text);outline:none}
.pill{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px;border-radius:14px;background:#FFF7FB;border:1px solid #FFE0EF;font-size:13px;font-weight:850}
.mood-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.mood{border:0;border-radius:16px;background:#FFF7FB;border:2px solid #FFE0EF;min-height:48px;font-size:24px}
.mood.active{background:linear-gradient(135deg,#FFF0F6,#FFD5E6);border-color:var(--pink)}
.calc{display:grid;grid-template-columns:1fr 1fr;gap:8px}.calc input{border:2px solid #FFE0EF;border-radius:12px;padding:8px;background:#FFF9FC;color:var(--text);width:100%}
.calc-result{grid-column:span 2;text-align:center;font-size:24px;color:var(--purple);font-weight:950}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pic{min-height:50px;border-radius:14px;background:linear-gradient(135deg,#FFD6E7,#F0E4FF);display:grid;place-items:center;font-size:22px}
.wall{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.wall .pic{min-height:34px;font-size:18px}
.cta{min-height:74px;display:grid;place-items:center;text-align:center;border-radius:18px;background:linear-gradient(90deg,var(--pink),var(--pink2));color:#fff;font-size:17px;font-weight:950;border:3px solid #fff}
.globe{font-size:68px;text-align:center;animation:spin 16s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.corner{position:absolute;right:14px;bottom:10px;color:rgba(123,75,163,.22);font-size:11px;font-weight:950;z-index:2}
.footer{text-align:center;color:var(--muted);font-size:12px;font-weight:850;margin-top:8px}

@media(max-width:1120px){.builder{grid-template-columns:1fr}.layout-top,.layout-grid,.layout-compact{grid-template-columns:repeat(3,1fr)}}
@media(max-width:780px){.layout-top,.layout-grid,.layout-compact,.layout-screensaver{grid-template-columns:repeat(2,1fr)}.layout-screensaver .widget.big-clock{grid-column:span 2}}
@media(max-width:540px){body{padding:8px}.pro-shell{padding:8px}.layout-top,.layout-grid,.layout-compact,.layout-screensaver{grid-template-columns:1fr}.layout-screensaver .widget.big-clock,.widget.wide{grid-column:auto}.big-clock .time{font-size:42px}.titlebox b{font-size:22px}}

/* === V2 自适应增强：Notion 顶部横屏 / 全屏屏保 === */
@media (orientation: landscape) and (min-width:900px){
  body{padding:10px}
  .pro-shell{padding:10px;min-height:100dvh}
  .pro-card{padding:12px}
  .pro-top{margin-bottom:10px}
  .titlebox b{font-size:clamp(22px,2.2vw,30px)}
  .titlebox span{font-size:12px}
  .avatar{width:44px;height:44px}
  .badge{padding:7px 12px;font-size:13px}
  .widgets{gap:8px}
  .layout-top{grid-template-columns:repeat(4,minmax(0,1fr))}
  .layout-grid{grid-template-columns:repeat(5,minmax(0,1fr))}
  .layout-compact{grid-template-columns:repeat(6,minmax(0,1fr))}
  .layout-screensaver{grid-template-columns:1.4fr 1fr 1fr}
  .widget{min-height:clamp(94px,18vh,138px);padding:10px;border-radius:20px}
  .density-cozy .widget{min-height:clamp(108px,20vh,148px)}
  .density-compact .widget{min-height:clamp(92px,17vh,124px)}
  .density-full .widget{min-height:clamp(78px,15vh,112px)}
  .layout-screensaver .widget.big-clock{min-height:clamp(190px,42vh,260px)}
  .widget h3{font-size:14px;margin-bottom:6px}
  .time{font-size:clamp(26px,3.2vw,38px)}
  .big-clock .time{font-size:clamp(48px,7vw,86px)}
  .bigtext{font-size:clamp(19px,2.2vw,26px)}
  .quote{font-size:clamp(15px,1.45vw,19px)}
  .temp{font-size:clamp(28px,3.4vw,42px)}
  .sun{font-size:clamp(34px,4vw,52px)}
  .cal span{min-height:clamp(15px,2.4vh,20px);font-size:9px}
  .count{padding:6px 3px}
  .count b{font-size:clamp(16px,2vw,22px)}
  .pill{padding:6px 8px;font-size:12px}
  .notearea{min-height:clamp(54px,10vh,82px)}
  .footer{font-size:11px;margin-top:6px}
}

/* Notion 顶部短框：高度很矮时，自动压缩卡片 */
@media (max-height:520px) and (min-width:900px){
  .pro-shell{padding:6px}
  .pro-card{padding:10px;border-radius:24px}
  .pro-top{margin-bottom:8px}
  .avatar{width:38px;height:38px}
  .titlebox b{font-size:22px}
  .titlebox span{font-size:11px}
  .badge{font-size:12px;padding:6px 10px}
  .widgets{gap:7px}
  .widget{min-height:92px;padding:8px;border-radius:18px}
  .density-cozy .widget,.density-compact .widget,.density-full .widget{min-height:92px}
  .layout-screensaver .widget.big-clock{min-height:190px}
  .widget h3{font-size:13px;margin-bottom:5px}
  .time{font-size:26px}
  .big-clock .time{font-size:58px}
  .quote{font-size:14px;line-height:1.3}
  .cal span{min-height:14px;font-size:8px}
  .cal b{font-size:8px}
  .nav span{min-height:36px}
  .pomo-time{font-size:28px}
  .notearea{min-height:48px}
  .footer{display:none}
}

/* 竖屏手机：不强行多列，保证可读 */
@media (orientation: portrait) and (max-width:780px){
  body{padding:8px}
  .builder{grid-template-columns:1fr}
  .panel,.preview{padding:12px;border-radius:24px}
  .pro-shell{padding:8px}
  .pro-card{border-radius:24px;padding:10px}
  .pro-top{align-items:flex-start}
  .titlebox b{font-size:21px;white-space:normal}
  .layout-top,.layout-grid,.layout-compact,.layout-screensaver{grid-template-columns:1fr}
  .layout-screensaver .widget.big-clock,.widget.wide{grid-column:auto}
  .widget{min-height:128px}
  .big-clock .time{font-size:42px}
}

/* 嵌入模式辅助：减少外边距，防止 Notion iframe 内出现多余空白 */
.embed-body{padding:0!important;overflow:auto}
.embed-body .pro-shell{min-height:100dvh}

.pro-shell.mode-topbar{min-height:auto}
.pro-shell.mode-topbar .pro-card{max-height:none}
.pro-shell.mode-topbar .widget{min-height:98px}
.pro-shell.mode-topbar .density-cozy .widget,.pro-shell.mode-topbar .density-compact .widget,.pro-shell.mode-topbar .density-full .widget{min-height:98px}
.pro-shell.mode-topbar .layout-screensaver .widget.big-clock{min-height:200px}
.pro-shell.mode-topbar .footer{display:none}

.pro-shell.mode-fullscreen{min-height:100dvh}
.pro-shell.mode-fullscreen .widget{min-height:clamp(140px,22vh,190px)}
.pro-shell.mode-fullscreen .layout-screensaver .widget.big-clock{min-height:clamp(260px,50vh,380px)}
.pro-shell.mode-fullscreen .big-clock .time{font-size:clamp(70px,9vw,120px)}


/* === V3 功能补强样式 === */
.mini-input,.mini-textarea{
  width:100%;
  border:2px solid #FFE0EF;
  border-radius:12px;
  padding:7px 9px;
  background:#FFF9FC;
  color:var(--text);
  outline:none;
  font-size:12px;
  font-weight:850;
}
.mini-input:focus,.mini-textarea:focus{
  border-color:var(--pink);
  box-shadow:0 0 0 2px rgba(255,107,157,.12);
}
.mini-textarea{min-height:48px;resize:vertical}
.form-mini{display:grid;gap:6px;margin-top:7px}
.form-mini.two{grid-template-columns:1fr 1fr}
.form-mini label{display:grid;gap:3px;font-size:11px;color:var(--muted);font-weight:900}
.money-num{font-size:22px;color:var(--purple);font-weight:950}
.gallery img,.wall img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  border-radius:inherit;
}
.gallery .pic,.wall .pic{overflow:hidden}
.small-tip{font-size:11px;color:var(--muted);font-weight:850;margin-top:5px}
.cta-link{text-decoration:none}
.cta-link.disabled{pointer-events:none}


/* === V4 本地图片拖拽上传 === */
.local-image-tools{
  display:grid;
  gap:6px;
  margin-top:7px;
}
.drop-zone{
  border:2px dashed #FFD3E4;
  border-radius:16px;
  background:#FFF9FC;
  color:var(--muted);
  font-size:12px;
  font-weight:900;
  min-height:46px;
  display:grid;
  place-items:center;
  text-align:center;
  padding:8px;
  transition:.18s;
}
.drop-zone.dragover{
  background:#FFF0F6;
  border-color:var(--pink);
  color:var(--purple);
  transform:scale(.99);
}
.local-file{
  width:100%;
  border:2px solid #FFE0EF;
  border-radius:14px;
  padding:8px;
  background:#fff;
  color:var(--muted);
  font-size:12px;
}
.local-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}
.local-btn{
  border:0;
  border-radius:999px;
  padding:8px 10px;
  font-size:12px;
  font-weight:950;
  background:#FFF0F6;
  color:var(--purple);
  border:2px solid #FFD6E7;
}
.local-btn.primary{
  color:#fff;
  background:linear-gradient(90deg,var(--pink),var(--pink2));
  border-color:#fff;
}
.gallery .pic,.wall .pic{
  position:relative;
}
.pic-remove{
  position:absolute;
  top:4px;
  right:4px;
  width:22px;
  height:22px;
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,.86);
  color:var(--purple);
  font-size:13px;
  font-weight:950;
  display:grid;
  place-items:center;
}

</style>
</head>
<body>
<div class="page" id="builderView">
  <div class="builder">
    <aside class="panel">
      <div class="brand">
        <div class="logo">元</div>
        <div><b>元五七 PRO</b><br><span>自由搭配动态工作台 V1</span></div>
      </div>
      <h1>把 Notion 变成你的动态屏保</h1>
      <p class="note">先选预设方案，再自由增减组件。生成链接后，复制到 Notion 里 /embed 即可。</p>

      <div class="block">
        <h3>① 成品方案</h3>
        <div class="preset-grid" id="presetGrid"></div>
      </div>

      <div class="block">
        <h3>② 基础设置</h3>
        <div class="field"><label>工作台名字</label><input id="titleInput" value="我的 PRO 动态工作台"></div>
        <div class="field"><label>副标题</label><input id="subInput" value="自由搭配 · 动态屏保 · Notion 首页"></div>
        <div class="field"><label>头像 emoji</label><input id="avatarInput" value="🌸"></div>
        <div class="field"><label>布局</label>
          <select id="layoutInput">
            <option value="top">顶部工作台</option>
            <option value="grid">多卡片工作台</option>
            <option value="compact">紧凑满屏</option>
            <option value="screensaver">屏保模式</option>
          </select>
        </div>
        <div class="field"><label>显示密度</label>
          <select id="densityInput">
            <option value="cozy">舒适</option>
            <option value="compact">紧凑</option>
            <option value="full">满屏</option>
          </select>
        </div>
        <div class="field"><label>动效</label>
          <select id="motionInput">
            <option value="on">开启轻动效</option>
            <option value="off">关闭动效</option>
          </select>
        </div>
        <div class="field"><label>使用场景</label>
          <select id="heightModeInput">
            <option value="auto">自动适配</option>
            <option value="topbar">Notion 顶部短框</option>
            <option value="fullscreen">全屏屏保</option>
          </select>
        </div>
      </div>

      <div class="block">
        <h3>③ 选择组件</h3>
        <div class="widget-list" id="widgetList"></div>
      </div>

      <div class="block">
        <h3>④ 生成 Notion 链接</h3>
        <div class="btn-row">
          <button class="btn primary" id="generateBtn">生成链接</button>
          <button class="btn" id="copyBtn">复制链接</button>
        </div>
        <div class="field">
          <label>复制到 Notion /embed 的链接</label>
          <textarea class="output" id="outputLink" readonly></textarea>
        </div>
      </div>
    </aside>

    <main class="preview">
      <div class="preview-head">

function initDynamic(target){

function drawCal(target){
  target.querySelectorAll("[data-cal]").forEach(el=>{
    const d=new Date(),y=d.getFullYear(),m=d.getMonth(),today=d.getDate();
    el.innerHTML=["日","一","二","三","四","五","六"].map(w=>`<b>${w}</b>`).join("");
    for(let i=0;i<new Date(y,m,1).getDay();i++) el.innerHTML+="<span></span>";
    for(let i=1;i<=new Date(y,m+1,0).getDate();i++) el.innerHTML+=`<span class="${i===today?'on':''}">${i}</span>`;
  });
}
const quotes=["“先完成，再完美。”","“把小事做好，就是很厉害的事。”","“慢慢来，也是向前走。”","“生活需要计划，也需要温柔。”","“稳定就是力量。”","“越清楚，越自由。”","“今天也请站在自己这边。”","“保持热爱，也保持节奏。”","“把喜欢的生活一点点搭出来。”","“愿你今天有光，也有方向。”"];
function dayIndex(len){const now=new Date(),start=new Date(now.getFullYear(),0,0);return Math.floor((now-start)/86400000)%len}
function initDaily(target){target.querySelectorAll("[data-quote]").forEach(el=>el.textContent=quotes[dayIndex(quotes.length)])}
function tick(target){
  const d=new Date(),h=d.getHours();
  target.querySelectorAll("[data-clock]").forEach(el=>el.textContent=`${pad(h)}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`);
  target.querySelectorAll("[data-date]").forEach(el=>el.textContent=`${d.getMonth()+1}月${d.getDate()}日`);
  target.querySelectorAll("[data-greet]").forEach(el=>el.textContent=h<12?"早上好":h<18?"下午好":"晚上好");
  const end=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59),start=new Date(d.getFullYear(),d.getMonth(),1);
  let diff=Math.max(0,end-d),dd=Math.floor(diff/86400000); diff%=86400000;
  let hh=Math.floor(diff/3600000); diff%=3600000; let mm=Math.floor(diff/60000); diff%=60000; let ss=Math.floor(diff/1000);
  target.querySelectorAll("[data-md]").forEach(el=>el.textContent=dd);
  target.querySelectorAll("[data-mh]").forEach(el=>el.textContent=pad(hh));
  target.querySelectorAll("[data-mm]").forEach(el=>el.textContent=pad(mm));
  target.querySelectorAll("[data-ms]").forEach(el=>el.textContent=pad(ss));
  const pct=Math.round((d-start)/(end-start)*100);
  target.querySelectorAll("[data-monthbar]").forEach(el=>el.style.width=pct+"%");
  target.querySelectorAll("[data-monthhint]").forEach(el=>el.textContent=`本月进度 ${pct}%`);
  const holiday=new Date(d.getFullYear(),9,1);
  if(holiday<d) holiday.setFullYear(d.getFullYear()+1);
  target.querySelectorAll("[data-holiday]").forEach(el=>el.textContent=Math.ceil((holiday-d)/86400000)+"天");
  updateCustomCountdown(target);
}
function bindPomo(target){
  target.querySelectorAll("[data-pomo-start]").forEach(btn=>{
    if(btn.dataset.bound) return; btn.dataset.bound="1";
    let remain=25*60,running=false,timer=null;
    const box=btn.closest(".widget"),display=box.querySelector("[data-pomo]"),reset=box.querySelector("[data-pomo-reset]");
    function draw(){display.textContent=`${pad(Math.floor(remain/60))}:${pad(remain%60)}`}
    btn.onclick=()=>{running=!running;btn.textContent=running?"暂停":"开始";if(running){timer=setInterval(()=>{remain=Math.max(0,remain-1);draw();if(remain===0){clearInterval(timer);running=false;btn.textContent="完成"}},1000)}else clearInterval(timer)};
    reset.onclick=()=>{clearInterval(timer);running=false;remain=25*60;btn.textContent="开始";draw()};draw();
  });
}

function persistKey(name){
  return "y57-pro-v3-" + name;
}
function bindPersistentFields(target){
  target.querySelectorAll("[data-save-text]").forEach(el=>{
    const key = persistKey(el.dataset.saveText);
    const old = localStorage.getItem(key);
    if(old !== null) el.value = old;
    el.addEventListener("input", ()=>{
      localStorage.setItem(key, el.value);
      bindMoneyWidgets(target);
      bindImageWidgets(target);
      bindCTA(target);
      updateCustomCountdown(target);
    });
  });
  updateCustomCountdown(target);
}
function pct(used,total){
  total = Number(total || 0);
  used = Number(used || 0);
  if(!total || total <= 0) return 0;
  return Math.max(0, Math.min(100, Math.round(used / total * 100)));
}
function bindMoneyWidgets(target){
  target.querySelectorAll("[data-budget-total]").forEach(totalEl=>{
    const box = totalEl.closest(".widget");
    const usedEl = box.querySelector("[data-budget-used]");
    const p = pct(usedEl.value, totalEl.value);
    box.querySelector("[data-budget-percent]").textContent = p + "%";
    box.querySelector("[data-budget-summary]").textContent = "¥" + (usedEl.value || 0) + " / ¥" + (totalEl.value || 0);
    box.querySelector("[data-budget-bar]").style.width = p + "%";
  });
  target.querySelectorAll("[data-saving-current]").forEach(curEl=>{
    const box = curEl.closest(".widget");
    const targetEl = box.querySelector("[data-saving-target]");
    const p = pct(curEl.value, targetEl.value);
    box.querySelector("[data-saving-summary]").textContent = "¥" + (curEl.value || 0) + " / ¥" + (targetEl.value || 0);
    box.querySelector("[data-saving-bar]").style.width = p + "%";
    box.querySelector("[data-saving-percent]").textContent = "存钱目标完成度 " + p + "%";
  });
}

const Y57_DB_NAME = "y57-pro-local-images-v4";
const Y57_STORE_NAME = "images";
function openY57DB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(Y57_DB_NAME,1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if(!db.objectStoreNames.contains(Y57_STORE_NAME)){
        db.createObjectStore(Y57_STORE_NAME,{keyPath:"id"});
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbPut(item){
  const db = await openY57DB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(Y57_STORE_NAME,"readwrite");
    tx.objectStore(Y57_STORE_NAME).put(item);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
async function dbGetAll(group){
  const db = await openY57DB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(Y57_STORE_NAME,"readonly");
    const req = tx.objectStore(Y57_STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result.filter(x=>x.group===group).sort((a,b)=>a.created-b.created));
    req.onerror = () => reject(req.error);
  });
}
async function dbDelete(id){
  const db = await openY57DB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(Y57_STORE_NAME,"readwrite");
    tx.objectStore(Y57_STORE_NAME).delete(id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
async function dbClearGroup(group){
  const items = await dbGetAll(group);
  await Promise.all(items.map(x=>dbDelete(x.id)));
}
function fileToDataURL(file, maxSize=1000, quality=.82){
  return new Promise((resolve,reject)=>{
    if(!file || !file.type.startsWith("image/")) return resolve(null);
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxSize / Math.max(img.width,img.height));
        const w = Math.max(1, Math.round(img.width * scale));
        const h = Math.max(1, Math.round(img.height * scale));
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function saveLocalFiles(group, files){
  const list = [...files].filter(f=>f.type.startsWith("image/")).slice(0,12);
  for(const file of list){
    const dataUrl = await fileToDataURL(file);
    if(dataUrl){
      await dbPut({
        id: group + "-" + Date.now() + "-" + Math.random().toString(16).slice(2),
        group,
        name:file.name,
        dataUrl,
        created:Date.now()
      });
    }
  }
}
async function renderLocalGallery(root, group){
  const box = root.querySelector(`[data-local-gallery="${group}"]`);
  if(!box) return;
  const items = await dbGetAll(group);
  const fallback = group === "wall" ? ["🌸","☁️","✨","🌙","🍀","🎀","📚","🧸"] : ["🌸","☁️","✨"];
  if(!items.length){
    box.innerHTML = fallback.map(x=>`<div class="pic">${x}</div>`).join("");
    return;
  }
  const max = group === "wall" ? 12 : 6;
  box.innerHTML = items.slice(-max).map(item=>`
    <div class="pic">
      <img src="${item.dataUrl}" alt="">
      <button class="pic-remove" data-remove-image="${item.id}" title="删除">×</button>
    </div>
  `).join("");
  box.querySelectorAll("[data-remove-image]").forEach(btn=>{
    btn.onclick = async () => {
      await dbDelete(btn.dataset.removeImage);
      renderLocalGallery(root, group);
    };
  });
}
function bindLocalImageWidgets(root){
  ["gallery","wall"].forEach(group=>{
    renderLocalGallery(root, group);
  });
  root.querySelectorAll("[data-local-file]").forEach(input=>{
    if(input.dataset.bound) return;
    input.dataset.bound = "1";
    input.addEventListener("change", async ()=>{
      await saveLocalFiles(input.dataset.localFile, input.files);
      input.value = "";
      renderLocalGallery(root, input.dataset.localFile);
    });
  });
  root.querySelectorAll("[data-drop-zone]").forEach(zone=>{
    if(zone.dataset.bound) return;
    zone.dataset.bound = "1";
    const group = zone.dataset.dropZone;
    zone.addEventListener("click", ()=>{
      const input = root.querySelector(`[data-local-file="${group}"]`);
      if(input) input.click();
    });
    ["dragenter","dragover"].forEach(evt=>{
      zone.addEventListener(evt, e=>{
        e.preventDefault();
        zone.classList.add("dragover");
      });
    });
    ["dragleave","drop"].forEach(evt=>{
      zone.addEventListener(evt, e=>{
        e.preventDefault();
        if(evt==="drop"){
          saveLocalFiles(group, e.dataTransfer.files).then(()=>renderLocalGallery(root, group));
        }
        zone.classList.remove("dragover");
      });
    });
  });
  root.querySelectorAll("[data-local-clear]").forEach(btn=>{
    if(btn.dataset.bound) return;
    btn.dataset.bound = "1";
    btn.onclick = async ()=>{
      await dbClearGroup(btn.dataset.localClear);
      renderLocalGallery(root, btn.dataset.localClear);
    };
  });
  root.querySelectorAll("[data-local-demo]").forEach(btn=>{
    if(btn.dataset.bound) return;
    btn.dataset.bound = "1";
    btn.onclick = async ()=>{
      await dbClearGroup(btn.dataset.localDemo);
      renderLocalGallery(root, btn.dataset.localDemo);
    };
  });
}
function parseUrls(text){
  return String(text || "")
    .split(/[\n,，]+/)
    .map(s=>s.trim())
    .filter(s=>/^https?:\/\//i.test(s));
}
function renderImageList(box, urls, fallback){
  if(!box) return;
  if(urls.length){
    box.innerHTML = urls.slice(0, fallback.length).map(url=>`<div class="pic"><img src="${esc(url)}" loading="lazy" alt=""></div>`).join("");
  }else{
    box.innerHTML = fallback.map(x=>`<div class="pic">${x}</div>`).join("");
  }
}
function bindImageWidgets(target){
  target.querySelectorAll("[data-gallery-urls]").forEach(el=>{
    renderImageList(el.closest(".widget").querySelector("[data-gallery-preview]"), parseUrls(el.value), ["🌸","☁️","✨"]);
  });
  target.querySelectorAll("[data-wall-urls]").forEach(el=>{
    renderImageList(el.closest(".widget").querySelector("[data-wall-preview]"), parseUrls(el.value), ["🌸","☁️","✨","🌙","🍀","🎀","📚","🧸"]);
  });
}
function bindCTA(target){
  target.querySelectorAll("[data-cta-text]").forEach(textEl=>{
    const box = textEl.closest(".widget");
    const urlEl = box.querySelector("[data-cta-url]");
    const btn = box.querySelector("[data-cta-button]");
    const text = textEl.value || "这是我的 PRO 动态工作台";
    const url = (urlEl.value || "").trim();
    btn.textContent = text;
    if(/^https?:\/\//i.test(url)){
      btn.href = url;
      btn.classList.remove("disabled");
    }else{
      btn.removeAttribute("href");
      btn.classList.add("disabled");
    }
  });
}
function updateCustomCountdown(target){
  target.querySelectorAll("[data-custom-countdown]").forEach(el=>{
    const box = el.closest(".widget");
    const nameEl = box.querySelector("[data-save-text='countdownName']");
    const dateEl = box.querySelector("[data-save-text='countdownDate']");
    const name = (nameEl && nameEl.value) || "目标日";
    let daysText = "--天";
    if(dateEl && dateEl.value){
      const now = new Date();
      const date = new Date(dateEl.value + "T23:59:59");
      const diff = Math.ceil((date - now) / 86400000);
      daysText = diff >= 0 ? diff + "天" : "已过";
    }
    el.textContent = daysText;
    const label = box.querySelector("[data-custom-countdown-label]");
    if(label) label.textContent = "距离" + name;
  });
}

function bindRanges(target){
  target.querySelectorAll("[data-progress-range]").forEach(r=>r.oninput=()=>{r.closest(".widget").querySelector("[data-progress-text]").textContent=r.value;r.closest(".widget").querySelector("[data-progress-bar]").style.width=r.value+"%"});
  target.querySelectorAll("[data-budget-range]").forEach(r=>r.oninput=()=>{r.closest(".widget").querySelector("[data-budget-text]").textContent=r.value+"%";r.closest(".widget").querySelector("[data-budget-bar]").style.width=r.value+"%"});
}
function bindMood(target){target.querySelectorAll(".mood").forEach(btn=>btn.onclick=()=>{btn.closest(".mood-row").querySelectorAll(".mood").forEach(b=>b.classList.remove("active"));btn.classList.add("active")})}
function bindCalc(target){
  target.querySelectorAll("[data-calc-a]").forEach(a=>{
    const box=a.closest(".calc"),b=box.querySelector("[data-calc-b]"),r=box.querySelector("[data-calc-result]");
    function calc(){r.textContent=(Number(a.value||0)*Number(b.value||0)).toFixed(1)}
    a.oninput=calc;b.oninput=calc;calc();
  });
}
function initEditableTitle(target){
  const t=target.querySelector("#mainTitle"),s=target.querySelector("#subTitle"),a=target.querySelector("#avatarBox");
  if(!t||t.dataset.bound) return; t.dataset.bound="1";
  const keys=["y57-pro-title","y57-pro-subtitle","y57-pro-avatar"];
  if(localStorage.getItem(keys[0])) t.textContent=localStorage.getItem(keys[0]);
  if(localStorage.getItem(keys[1])) s.textContent=localStorage.getItem(keys[1]);
  if(localStorage.getItem(keys[2])) a.textContent=localStorage.getItem(keys[2]);
  [t,s].forEach((el,i)=>{el.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();el.blur()}});el.addEventListener("input",()=>localStorage.setItem(keys[i],el.textContent.trim()))});
}
function initBuilder(){
  const presetGrid=$("presetGrid");
  presetGrid.innerHTML=Object.entries(PRESETS).map(([k,p])=>`<button class="preset" data-preset="${k}">${p.name}</button>`).join("");
  const widgetList=$("widgetList");
  widgetList.innerHTML=Object.entries(WIDGETS).map(([k,v])=>`<label class="check"><input data-widget type="checkbox" value="${k}">${v[0]}</label>`).join("");
  presetGrid.querySelectorAll("[data-preset]").forEach(btn=>btn.onclick=()=>applyPreset(btn.dataset.preset));
  ["titleInput","subInput","avatarInput","layoutInput","densityInput","motionInput","heightModeInput"].forEach(id=>$(id).addEventListener("input",updatePreview));
  widgetList.querySelectorAll("[data-widget]").forEach(i=>i.addEventListener("change",updatePreview));
  $("generateBtn").onclick=updateLink;
  $("copyBtn").onclick=async()=>{updateLink();try{await navigator.clipboard.writeText($("outputLink").value);$("copyBtn").textContent="已复制";setTimeout(()=>$("copyBtn").textContent="复制链接",1200)}catch(e){$("outputLink").select()}};
  applyPreset("study");
}
function applyPreset(key){
  const p=PRESETS[key]||DEFAULT;
  $("layoutInput").value=p.layout;$("densityInput").value=p.density;$("motionInput").value="on";$("heightModeInput").value="auto";
  document.querySelectorAll("[data-preset]").forEach(b=>b.classList.toggle("active",b.dataset.preset===key));
  document.querySelectorAll("[data-widget]").forEach(i=>i.checked=p.widgets.includes(i.value));
  updatePreview();
}
function getConfigFromUI(){
  return {title:$("titleInput").value,subtitle:$("subInput").value,avatar:$("avatarInput").value,layout:$("layoutInput").value,density:$("densityInput").value,motion:$("motionInput").value,heightMode:$("heightModeInput").value,widgets:[...document.querySelectorAll("[data-widget]:checked")].map(i=>i.value)}
}
function updatePreview(){renderDashboard(getConfigFromUI(),$("previewBox"));updateLink()}
function updateLink(){
  const c=getConfigFromUI(),url=new URL(location.href);url.search="";
  url.searchParams.set("view","embed");url.searchParams.set("title",c.title);url.searchParams.set("subtitle",c.subtitle);url.searchParams.set("avatar",c.avatar);
  url.searchParams.set("layout",c.layout);url.searchParams.set("density",c.density);url.searchParams.set("motion",c.motion);url.searchParams.set("heightMode",c.heightMode);url.searchParams.set("widgets",c.widgets.join(","));
  $("outputLink").value=url.toString();
}
function boot(){
  const p=new URLSearchParams(location.search);
  if(p.get("view")==="embed"){
    document.body.classList.add("embed-body");document.body.style.padding="0";$("builderView").style.display="none";$("embedView").style.display="block";
    renderDashboard(getConfigFromParams(),$("embedView"));return;
  }
  initBuilder();
}
boot();
