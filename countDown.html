<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倒计时</title>
<style>
body {
  font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
  background: #fff; text-align: center; margin: 0; padding: 12px;
}
.title { color: #9b59b6; font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.box {
  min-width: 64px; padding: 10px 4px; border-radius: 14px;
  background: #f3f8ff; border: 2px solid rgba(155,89,182,0.2);
  box-shadow: 0 2px 10px rgba(155,89,182,0.06);
}
.num {
  font-family: 'JetBrains Mono','SF Mono',monospace;
  font-size: 36px; font-weight: 800; color: #9b59b6; line-height: 1.1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lbl { font-size: 12px; color: #999; margin-top: 2px; }
</style>
</head>
<body>
<div class="title">⏳ 距离目标还有</div>
<div class="row">
  <div class="box"><div class="num" id="d">--</div><div class="lbl">天</div></div>
  <div class="box"><div class="num" id="h">--</div><div class="lbl">时</div></div>
  <div class="box"><div class="num" id="m">--</div><div class="lbl">分</div></div>
  <div class="box"><div class="num" id="s">--</div><div class="lbl">秒</div></div>
</div>
<script>
var target = new Date('2026-12-31T23:59:59');
function upd(){
  var diff = target - new Date();
  if(diff < 0){ diff = 0; }
  var ds = Math.floor(diff/86400000);
  var hs = Math.floor((diff%86400000)/3600000);
  var ms = Math.floor((diff%3600000)/60000);
  var ss = Math.floor((diff%60000)/1000);
  document.getElementById('d').textContent = ds;
  document.getElementById('h').textContent = hs;
  document.getElementById('m').textContent = ms;
  document.getElementById('s').textContent = ss;
}
upd(); setInterval(upd, 1000);
</script>
<div style="position:fixed;bottom:10px;right:14px;background:rgba(155,89,182,0.9);color:#fff;padding:5px 12px;border-radius:18px;font-size:11px;font-weight:600;font-family:'PingFang SC','Microsoft YaHei',sans-serif;z-index:99999;box-shadow:0 2px 8px rgba(0,0,0,.2);pointer-events:none;letter-spacing:1px">🔒 付费解锁</div>
</body>
</html>
