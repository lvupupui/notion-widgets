<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日一言</title>
<style>
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', serif;
  background: #fff; display: flex; justify-content: center;
  align-items: center; min-height: 80px; margin: 0; padding: 8px;
}
.card {
  text-align: center; max-width: 320px;
}
.quote {
  font-size: 16px; color: #555; line-height: 1.8;
  font-style: italic; margin-bottom: 6px;
}
.author { font-size: 12px; color: #9b59b6; }
</style>

<style>
body::after {
  content: "🔒 付费解锁";
  position: fixed; bottom: 12px; right: 16px;
  background: rgba(155,89,182,0.92); color: #fff;
  padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
  z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,.2);
  pointer-events: none;
}
</style>

</head>
<body>
<div class="card">
  <div class="quote" id="q">"生活不是等待暴风雨过去，而是学会在雨中跳舞。"</div>
  <div class="author" id="a">— 未知</div>
</div>
<script>
var quotes = [
  ["生活不是等待暴风雨过去，而是学会在雨中跳舞。","未知"],
  ["种一棵树最好的时间是十年前，其次是现在。","非洲谚语"],
  ["不要因为走得太远，而忘记为什么出发。","纪伯伦"],
  ["你今天的努力，是幸运的伏笔。","佚名"],
  ["行动是治愈恐惧的良药。","戴尔·卡耐基"],
  ["每一个不曾起舞的日子，都是对生命的辜负。","尼采"],
  ["山重水复疑无路，柳暗花明又一村。","陆游"],
  ["宝剑锋从磨砺出，梅花香自苦寒来。","警世贤文"],
];
var i = Math.floor(Math.random() * quotes.length);
document.getElementById('q').textContent = '"' + quotes[i][0] + '"';
document.getElementById('a').textContent = '— ' + quotes[i][1];
</script>
</body>
</html>
