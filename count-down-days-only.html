<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倒计时</title>
<style>
body {
  font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
  background: #fff; text-align: center; margin: 0; padding: 12px;
}
.box {
  display: inline-block; padding: 12px 20px; border-radius: 16px;
  background: #f3f8ff; border: 2px solid rgba(155,89,182,0.2);
  box-shadow: 0 2px 12px rgba(155,89,182,0.06);
  min-width: 100px;
}
.num {
  font-family: 'JetBrains Mono','SF Mono',monospace;
  font-size: 52px; font-weight: 800; color: #9b59b6; line-height: 1.1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lbl { font-size: 14px; color: #999; margin-top: 4px; }
</style>
</head>
<body>
<div class="box">
  <div class="num" id="d">--</div>
  <div class="lbl">天</div>
</div>
<br><span style="font-size:12px;color:#aaa;">距离 2026.12.31</span>
<script>
var target = new Date('2026-12-31');
function upd(){
  var ds = Math.ceil((target - new Date())/86400000);
  if(ds < 0) ds = 0;
  document.getElementById('d').textContent = ds;
}
upd(); setInterval(upd, 3600000);
</script>
<div style="position:fixed;bottom:10px;right:14px;background:rgba(155,89,182,0.9);color:#fff;padding:5px 12px;border-radius:18px;font-size:11px;font-weight:600;font-family:'PingFang SC','Microsoft YaHei',sans-serif;z-index:99999;box-shadow:0 2px 8px rgba(0,0,0,.2);pointer-events:none;letter-spacing:1px">🔒 付费解锁</div>
</body>
</html>
