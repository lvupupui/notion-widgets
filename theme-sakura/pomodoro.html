<style>
:root {
  --pink: #FF6B9D;
  --purple: #7B4BA3;
  --soft-purple: #C9B3FF;
  --light-pink: #FFE2EE;
  --yellow: #FFD66B;
  --cream: #FFF8F3;
  --text: #4B2B68;
  --text-light: #8B6BA3;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: 'ZCOOL KuaiLe','PingFang SC','Microsoft YaHei',sans-serif;
  background: linear-gradient(180deg, #FFE2EF 0%, #F6E7FF 50%, #FFF7EF 100%);
  min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;
}
.card{
  background: rgba(255,255,255,0.86);backdrop-filter:blur(12px);
  border:2px solid rgba(255,255,255,0.95);border-radius:28px;
  box-shadow: 0 16px 40px rgba(123,75,163,0.16), 0 6px 14px rgba(255,107,157,0.12);
  padding:28px;text-align:center;color:var(--text);
}
.title{
  font-size:22px;font-weight:900;color:var(--purple);margin-bottom:16px;
  text-shadow: 3px 3px 0 #fff, -3px 3px 0 #fff, 3px -3px 0 #fff, -3px -3px 0 #fff, 0 8px 16px rgba(123,75,163,0.12);
}
.num{
  font-family:'JetBrains Mono','SF Mono',monospace;
  font-size:48px;font-weight:800;color:var(--pink);
  line-height:1.1;
}
.label{font-size:13px;color:var(--text-light);margin-top:2px}
.pill{
  display:inline-block;padding:8px 22px;border-radius:999px;
  background:linear-gradient(90deg,#FF79A8,#FFC0D9);color:#fff;
  font-weight:700;font-size:14px;box-shadow:0 8px 18px rgba(255,107,157,0.28);
}
.btn{
  display:inline-block;padding:10px 24px;border-radius:999px;
  border:none;font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .2s;
}
.btn-primary{background:linear-gradient(90deg,#FF72A6,#FFC0D9);color:#fff;box-shadow:0 6px 16px rgba(255,107,157,0.25)}
.btn-primary:hover{transform:translateY(-2px)}
.btn-light{background:#E9D8FF;color:#6D3C98}
.btn-light:hover{background:#D8C3F2}
.grid{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.box{
  background:rgba(255,255,255,0.78);border-radius:24px;
  border:2px solid rgba(240,200,220,0.6);
  box-shadow:0 8px 20px rgba(123,75,163,0.10);
  padding:14px 16px;min-width:64px;text-align:center;
}
.star{color:var(--yellow);text-shadow:0 0 8px rgba(255,214,107,.5)}
.decor{font-size:28px;position:absolute}

.pom-ring{width:180px;height:180px;margin:16px auto;position:relative}
.pom-svg{transform:rotate(-90deg)}
.pom-bg{fill:none;stroke:var(--light-pink);stroke-width:8}
.pom-progress{fill:none;stroke:url(#pg);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.pom-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:800;color:var(--pink)}
.tabs{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
.tab{padding:8px 18px;border-radius:999px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:rgba(255,255,255,0.6);color:var(--text-light)}
.tab.active{background:linear-gradient(90deg,#FF72A6,#FFC0D9);color:#fff}
</style></head><body>
<div class="card"><span class="decor" style="top:8px;right:12px">🍅</span>
<div class="tabs"><button class="tab active" data-min="25">番茄 25分</button><button class="tab" data-min="5">短休 5分</button><button class="tab" data-min="15">长休 15分</button></div>
<div class="pom-ring"><svg class="pom-svg" width="180" height="180" viewBox="0 0 180 180">
<defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#FF6B9D"/><stop offset="100%" style="stop-color:#FFC0D9"/></linearGradient></defs>
<circle class="pom-bg" cx="90" cy="90" r="80"/>
<circle class="pom-progress" id="prog" cx="90" cy="90" r="80" stroke-dasharray="502.65" stroke-dashoffset="0"/></svg>
<div class="pom-time" id="time">25:00</div></div>
<div class="grid"><button class="btn btn-primary" id="btnS">▶ 开始</button><button class="btn btn-light" id="btnP">⏸ 暂停</button><button class="btn btn-light" id="btnR">↺ 重置</button></div>
</div><script>
var tot=1500,rem=tot,iv=null,c=502.65;
function u(){var m=Math.floor(rem/60),s=rem%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');document.getElementById('prog').style.strokeDashoffset=c*(1-rem/tot)}
document.getElementById('btnS').onclick=function(){if(iv)return;iv=setInterval(function(){if(rem<=0){clearInterval(iv);iv=null;alert('🍅 时间到！');return}rem--;u()},1000)};
document.getElementById('btnP').onclick=function(){clearInterval(iv);iv=null};
document.getElementById('btnR').onclick=function(){clearInterval(iv);iv=null;rem=tot;u()};
document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){document.querySelector('.tab.active').classList.remove('active');t.classList.add('active');tot=parseInt(t.dataset.min)*60;rem=tot;clearInterval(iv);iv=null;u()}});
u();
</script></body></html>
